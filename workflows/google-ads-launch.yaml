id: google-ads-launch
name: Google Ads Campaign Launch
version: 1.0.0
objective: Design and prepare a Google Ads campaign for launch, gated by explicit human approval before any spend.
industries: [common, saas, ecommerce, real-estate, retail]
trigger: User requests a Google Ads / paid-search campaign.
required_inputs:
  - objective
  - budget
  - target market
  - conversion definition
optional_inputs:
  - keywords
  - landing pages
  - existing account data
preconditions:
  - No account changes are made; output is a plan requiring approval.
steps:
  - id: architecture
    name: Design account/campaign architecture
    type: skill
    ref: paid-search.campaign-architecture
  - id: keywords
    name: Plan keywords, match types and negatives
    type: skill
    ref: paid-search.keyword-planning
  - id: copy
    name: Write responsive search ad copy
    type: skill
    ref: paid-search.search-ad-copy
  - id: tracking
    name: Confirm conversion tracking plan
    type: skill
    ref: analytics.tracking-plan-design
  - id: compliance
    name: Screen for policy and compliance risks
    type: skill
    ref: compliance.marketing-compliance-assessment
  - id: launch_gate
    name: Approval gate before launch or budget change
    type: approval_gate
    approval_required: true
outputs:
  - campaign structure
  - keywords & match types
  - negatives
  - ad copy
  - bidding
  - tracking
  - budget
  - approvals
kpis:
  - CPA
  - ROAS
  - conversion rate
approval_gates:
  - launch_gate
retry_rules:
  transient: retry with backoff on connector errors
failure_paths:
  - if tracking invalid, block launch
audit_requirements:
  - record proposed spend, targeting and approver
rollback_guidance: Nothing is launched until approved; to reverse, do not approve or pause via platform.
