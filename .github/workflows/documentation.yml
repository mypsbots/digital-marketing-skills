name: Documentation

on:
  push:
    branches: [main]
    paths: ['docs/**', 'mkdocs.yml', 'README.md']
  pull_request:
    paths: ['docs/**', 'mkdocs.yml']

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mkdocs mkdocs-material
      - run: mkdocs build --strict
