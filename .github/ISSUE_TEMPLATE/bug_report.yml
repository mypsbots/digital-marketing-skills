name: Bug report
description: Report a defect in the server, a skill, a connector or documentation.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and its impact.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, inputs and (redacted) outputs.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, transport (stdio/http), connector (mock/live).
  - type: checkboxes
    id: no-secrets
    attributes:
      label: Confirmation
      options:
        - label: I have not included any secrets, credentials or personal data.
          required: true
