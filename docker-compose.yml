services:
  mcp-http:
    build: .
    image: digital-marketing-skills-mcp:latest
    command: ['dist/server/index.js', '--transport', 'http']
    environment:
      DM_MCP_TRANSPORT: http
      DM_MCP_HTTP_HOST: 0.0.0.0
      DM_MCP_HTTP_PORT: '8080'
      DM_MCP_READ_ONLY: 'true'
      DM_MCP_WRITE_DRY_RUN_DEFAULT: 'true'
      DM_MCP_REQUIRE_APPROVAL: 'true'
      DM_MCP_LOG_LEVEL: info
      DM_MCP_LOG_FORMAT: json
    ports:
      - '8080:8080'
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
